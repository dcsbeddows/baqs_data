sources.forEach(source => {

    const list = document.getElementById(source.listId);
    const files = fileIndex[source.path] || [];

    const filtered = files
        .filter(file =>
            source.extensions.some(ext =>
                file.toLowerCase().endsWith(ext)
            )
        )
        .sort();

    if (filtered.length === 0) {
        const li = document.createElement("li");
        li.textContent = `No ${source.title} files found`;
        list.appendChild(li);
        return;
    }

    filtered.forEach(file => {

        const li = document.createElement("li");
        const a = document.createElement("a");

        const rawUrl =
            `https://raw.githubusercontent.com/dcsbeddows/baqs_data/main/${source.path}/${file}`;

        a.href = "#";
        a.textContent = file;

        a.addEventListener("click", async (e) => {
            e.preventDefault();

            try {
                const response = await fetch(rawUrl);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);

                const downloadLink = document.createElement("a");
                downloadLink.href = blobUrl;
                downloadLink.download = file;

                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

                URL.revokeObjectURL(blobUrl);

            } catch (error) {
                console.error(`Download failed for ${file}:`, error);
                alert(`Unable to download ${file}`);
            }
        });

        li.appendChild(a);
        list.appendChild(li);
    });
});
