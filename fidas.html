<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDAS Monthly Data</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            color: #333;
        }

        a {
            color: #0366d6;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        li {
            margin: 6px 0;
        }
    </style>
</head>
<body>

<h1>FIDAS Monthly Data</h1>

<p>
    Monthly CSV files from May 2019 through March 2026.
</p>

<p>
    <a href="index.html">← Return to Home Page</a>
</p>

<p id="loading">Loading file list...</p>

<ul id="file-list"></ul>

<script>
const owner = "dcsbeddows";
const repo = "baqs_data";
const folder = "fidas";

fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${folder}`)
    .then(response => response.json())
    .then(files => {

        document.getElementById("loading").style.display = "none";

        const list = document.getElementById("file-list");

        files
            .filter(file => file.name.toLowerCase().endsWith(".csv"))
            .sort((a,b) => a.name.localeCompare(b.name))
            .forEach(file => {

                const li = document.createElement("li");

                const a = document.createElement("a");

                a.href =
                  `https://raw.githubusercontent.com/${owner}/${repo}/main/fidas/${file.name}`;

                a.textContent = file.name;

                li.appendChild(a);
                list.appendChild(li);
            });
    });
</script>

</body>
</html>
