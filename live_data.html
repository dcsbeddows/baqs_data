<!DOCTYPE html>
<html lang="en">
<head>
    <title>LIVE DATA</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 10px;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin: 6px 0;
        }
		
        a {
            text-decoration: none;
            color: #1a73e8;
            font-size: 18px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

</head>

<body>

<h1>Current Computer Time</h1>

<div id="time">Loading...</div>

<script>
fetch("data.json")
  .then(response => response.json())
  .then(data => {
      document.getElementById("time").textContent =
          data.time;
  });
</script>

</body>

</html>
